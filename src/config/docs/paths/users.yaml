GetUsers:
  get:
    summary: Obtener lista de usuarios con paginación y filtro por nombre de usuario
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          default: 20
      - name: user
        in: query
        required: false
        schema:
          type: string
    responses:
      '200':
        description: Lista de usuarios obtenida exitosamente
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                  example: 200
                statusCode:
                  type: integer
                  example: 200
                data:
                  type: array
                  items:
                    $ref: '../schemas/user.yaml#/components/schemas/User'
                page:
                  type: integer
                  example: 1
                pageSize:
                  type: integer
                  example: 20
                totalCount:
                  type: integer
                  example: 124

PostUser:
  post:
    summary: Crear un nuevo usuario y asignarlo a una unidad y sucursal
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: unid
        in: query
        required: false
        schema:
          type: string
      - name: branch
        in: query
        required: false
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - name
              - last_name
              - email
              - password
            properties:
              username:
                type: string
                example: "jacobo.hernandez"
              name:
                type: string
                example: "Jacobo"
              last_name:
                type: string
                example: "Hernández"
              second_last_name:
                type: string
                example: "Mendieta"
              email:
                type: string
                format: email
                example: "jacobo@example.com"
              password:
                type: string
                format: password
                example: "********"
    responses:
      '201':
        description: Usuario creado exitosamente
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                  example: 201
                statusCode:
                  type: integer
                  example: 201
                data:
                  allOf:
                    - $ref: '../schemas/user.yaml#/components/schemas/User'
                    - type: object
                      properties:
                        preferences:
                          $ref: '../schemas/user.yaml#/components/schemas/Preferences'
                        userBusiness:
                          $ref: '../schemas/user.yaml#/components/schemas/UserBusiness'
                        location:
                          $ref: '../schemas/user.yaml#/components/schemas/Location'

UserItem:
  get:
    summary: Obtener un usuario por su identificador
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Usuario obtenido exitosamente
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                  example: 200
                statusCode:
                  type: integer
                  example: 200
                data:
                  allOf:
                    - $ref: '../schemas/user.yaml#/components/schemas/User'
                    - type: object
                      properties:
                        preferences:
                          $ref: '../schemas/user.yaml#/components/schemas/Preferences'
                        userBusiness:
                          $ref: '../schemas/user.yaml#/components/schemas/UserBusiness'
                        location:
                          $ref: '../schemas/user.yaml#/components/schemas/Location'
  put:
    summary: Actualizar información básica de un usuario
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: "Jacobo"
              last_name:
                type: string
                example: "Hernández"
              second_last_name:
                type: string
                example: "Mendieta"
              phone:
                type: string
                example: "+52 55 1234 5678"
    responses:
      '201':
        description: Usuario actualizado exitosamente

PostUserImage:
  put:
    summary: Subir y actualizar imagen de perfil de un usuario
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: pub
        in: query
        required: false
        schema:
          type: string
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
    responses:
      '201':
        description: Imagen de perfil actualizada exitosamente

PostResetPassword:
  put:
    summary: Restablecer la contraseña de un usuario
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - pass
              - last_pass
            properties:
              pass:
                type: string
                format: password
              last_pass:
                type: string
                format: password
    responses:
      '201':
        description: Contraseña actualizada exitosamente

PutUserPreferences:
  put:
    summary: Actualizar preferencias de usuario
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              theme:
                type: string
              lang:
                type: string
    responses:
      '201':
        description: Preferencias actualizadas exitosamente

GetUserDetail:
  get:
    summary: Obtener detalles extendidos de un usuario (incluyendo sesiones)
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Detalles obtenidos exitosamente

RevokeSession:
  delete:
    summary: Revocar todas las sesiones de un usuario
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '201':
        description: Sesiones revocadas exitosamente

GetFederateData:
  get:
    summary: Obtener datos federados de un usuario
    tags:
      - Users
    security:
      - OAuth2: []
    parameters:
      - name: user
        in: query
        required: true
        schema:
          type: string
      - name: client
        in: query
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Datos federados obtenidos exitosamente

DownloadImage:
  get:
    summary: Descargar imagen de perfil
    tags:
      - Users
    parameters:
      - name: file
        in: query
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Imagen descargada exitosamente
